<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#7c5cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BrainHUB" />
  <link rel="apple-touch-icon" href="./imagens/favicon.png" />
  <link rel="icon" type="image/png" href="./imagens/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c5cff" />
  <title>BrainHUB — Sem conexão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #141418;
      color: #f3f3f6;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #7c5cff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      color: white;
    }
    h1 { font-size: 1.4rem; color: #f3f3f6; }
    p { color: #a4a4b3; font-size: 0.95rem; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #7c5cff;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">B</div>
  <h1>Sem conexão com a internet</h1>
  <p>Verifique sua conexão e tente novamente para acessar o BrainHUB.</p>
  <button onclick="location.reload()">Tentar novamente</button>
  <script src="./scripts/pwa.js"></script>
</body>
</html>
