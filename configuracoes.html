<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#7c5cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BrainHUB" />
  <link rel="apple-touch-icon" href="./imagens/icon-192.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BrainHUB | Configurações</title>
  <link rel="stylesheet" href="./css/home.css?v=2" />
  <link rel="stylesheet" href="./css/configuracoes.css" />
  <script src="https://unpkg.com/lucide@0.511.0"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="home.html" class="brand">
        <div class="brand-icon">B</div>
        <h1>Brain<span>HUB</span></h1>
      </a>
    </div>
    <nav class="main-nav">
      <a href="home.html"><i data-lucide="house"></i> Feed</a>
      <a href="grupos.html"><i data-lucide="users"></i> Grupos</a>
      <a href="chat.html"><i data-lucide="message-circle"></i> Chat</a>
      <a href="exercicios.html"><i data-lucide="zap"></i> Exercícios</a>
      <a href="perfil.html"><i data-lucide="user"></i> Perfil</a>
    </nav>
    <div class="top-actions">
      <button class="icon-btn notification-btn" onclick="window.location.href='notificacoes.html'">
        <i data-lucide="bell"></i>
        <span class="badge" style="display:none">0</span>
      </button>
      <button class="icon-btn"><i data-lucide="search"></i></button>
    </div>
  </header>

  <main class="layout">
    <aside class="left-column">
      <section class="profile-card card">
        <div class="profile-banner"></div>
        <div class="profile-avatar">U</div>
        <h2>Usuário</h2>
        <p>Carregando...</p>
        <div class="profile-stats">
          <div><strong id="statMeusPosts">—</strong><span>POSTS</span></div>
          <div><strong id="statMeusSeguidores">—</strong><span>SEGUIDORES</span></div>
          <div><strong id="statMeusSeguindo">—</strong><span>SEGUINDO</span></div>
        </div>
      </section>

      <section class="menu-card card">
        <a href="home.html"          class="menu-item"><i data-lucide="user-round"></i> Feed</a>
        <a href="meus-posts.html"    class="menu-item"><i data-lucide="file-text"></i> Meus Posts</a>
        <a href="salvos.html"        class="menu-item"><i data-lucide="bookmark"></i> Salvos</a>
        <a href="configuracoes.html" class="menu-item active"><i data-lucide="settings"></i> Configurações</a>
      </section>
    </aside>

    <section class="center-column">
      <div class="feed-scroll" id="painelConfig"></div>
    </section>

    <aside class="right-column">
      <section class="subjects-card card">
        <h3><i data-lucide="book-open"></i> Matérias Populares</h3>
        <div class="chips">
          <span>Cálculo</span><span>Física</span><span>Algoritmos</span>
          <span>Estatística</span><span>Redes</span><span>IA</span>
          <span>Química</span><span>Biologia</span><span>Filosofia</span>
        </div>
      </section>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('HBX2IWHj4B4btav_M')</script>
  <script src="./scripts/brainhub-shared.js"></script>
  <script type="module" src="./scripts/supabaseClient.js"></script>
  <script defer src="./scripts/configuracoes.js"></script>

  <div class="search-overlay hidden" id="searchOverlay">
    <div class="search-modal">
      <div class="search-input-wrap">
        <i data-lucide="search"></i>
        <input type="text" id="searchGlobal" placeholder="Pesquise posts, grupos, usuários..." autofocus />
        <button class="search-close" id="searchClose"><i data-lucide="x"></i></button>
      </div>
      <div id="searchFilters"></div>
      <div class="search-results" id="searchResults">
        <p class="search-hint">Digite algo para pesquisar...</p>
      </div>
    </div>
  </div>
  <script src="./scripts/search.js"></script>

  <nav class="mobile-bottom-nav">
    <a href="home.html" class="mob-nav-item"><i data-lucide="house"></i><span>Feed</span></a>
    <a href="grupos.html" class="mob-nav-item"><i data-lucide="users"></i><span>Grupos</span></a>
    <a href="chat.html" class="mob-nav-item"><i data-lucide="message-circle"></i><span>Chat</span></a>
    <a href="exercicios.html" class="mob-nav-item"><i data-lucide="zap"></i><span>Exercícios</span></a>
    <a href="perfil.html" class="mob-nav-item active"><i data-lucide="user"></i><span>Perfil</span></a>
  </nav>
  <script src="./scripts/pwa.js"></script>
</body>
</html>
