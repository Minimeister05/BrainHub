<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainHUB | Suporte</title>
    <link rel="stylesheet" href="../css/suporte.css">
</head>

<body>
    <div class="background-overlay"></div>
    <header class="topbar">
        <div class="logo-area">
            <div class="logo-circle">B</div>
            <h1>BrainHUB</h1>
        </div>

        <nav class="top-nav">
            <a href="sobre.html" class="active">Sobre</a>
            <a href="suporte.html">Suporte</a>
        </nav>
    </header>

    <main class="login-page">
        <section class="login-card">
            <div class="login-icon">
                B
            </div>
            <h2>Suporte</h2>
            <p class="subtitle">Teve algum problema? Mande uma mensagem para o nosso time.</p></p>

            <form id="suporteForm" class="login-form">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" placeholder="Seu nome" required />
                </div>
                <div class="input-group">
                    <label>Assunto</label>
                    <input type="text" placeholder="Ex: Problema no Login" required />
                </div>
                <div class="input-group">
                    <label>Mensagem</label>
                    <textarea style="width: 100%; background:#161618; border: 1px solid #2e2e34; border-radius: 14px; color: white; padding: 14px; outline: none; min-height: 100px; resize: vertical; max-width: 100%; box-sizing: border-box;"></textarea>
                </div>
                <button type="submit" class="login-button">Enviar Mensagem</button>
            </form>

            <script src="../scripts/auth.js"></script>
        </section>
    </main>


</body>

</html>
