<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainHUB | Perfil</title>
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/perfil.css" />
  <link rel="stylesheet" href="../css/usuario.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🧠</div>
      <h1>Brain<span>HUB</span></h1>
    </div>
    <nav class="main-nav">
      <a href="home.html"><i data-lucide="house"></i> Feed</a>
      <a href="grupos.html"><i data-lucide="users"></i> Grupos</a>
      <a href="chat.html"><i data-lucide="message-circle"></i> Mensagens</a>
      <a href="perfil.html"><i data-lucide="user"></i> Perfil</a>
    </nav>
    <div class="top-actions">
      <button class="icon-btn notification-btn" onclick="window.location.href='notificacoes.html'">
        <i data-lucide="bell"></i>
        <span class="badge">3</span>
      </button>
      <button class="icon-btn"><i data-lucide="search"></i></button>
    </div>
  </header>

  <main class="layout">
    <aside class="left-column">
      <section class="profile-card card">
        <div class="profile-banner"></div>
        <div class="profile-avatar" id="sideAvatar">?</div>
        <h2 id="sideNome">Carregando...</h2>
        <p id="sideCurso"></p>
        <div class="profile-stats">
          <div><strong id="statPosts">0</strong><span>POSTS</span></div>
          <div><strong id="statSeguidores">0</strong><span>SEGUIDORES</span></div>
          <div><strong id="statSeguindo">0</strong><span>SEGUINDO</span></div>
        </div>
      </section>
      <section class="menu-card card">
        <a href="home.html" class="menu-item"><i data-lucide="user-round"></i> Feed</a>
        <a href="meus-posts.html" class="menu-item"><i data-lucide="file-text"></i> Meus Posts</a>
        <a href="salvos.html" class="menu-item"><i data-lucide="bookmark"></i> Salvos</a>
        <a href="configuracoes.html" class="menu-item"><i data-lucide="settings"></i> Configurações</a>
      </section>
    </aside>

    <section class="center-column">
      <div class="usuario-header card" id="usuarioHeader">
        <div class="usuario-avatar-wrap">
          <div class="perfil-avatar" id="usuarioAvatar">?</div>
        </div>
        <div class="usuario-info">
          <div class="usuario-nome-row">
            <h2 id="usuarioNome">Carregando...</h2>
          </div>
          <p id="usuarioCurso" class="usuario-sub"></p>
          <p id="usuarioBio" class="usuario-bio"></p>
        </div>
        <div class="usuario-acoes">
          <button class="usuario-follow-btn" id="btnFollow">
            <i data-lucide="user-plus"></i> Seguir
          </button>
          <a class="usuario-msg-btn" id="btnMsg" href="chat.html">
            <i data-lucide="message-circle"></i> Mensagem
          </a>
        </div>
      </div>

      <div class="feed-scroll" id="usuarioPosts">
        <p style="color:var(--muted);text-align:center;padding:32px">Carregando posts...</p>
      </div>
    </section>

    <aside class="right-column">
      <section class="subjects-card card">
        <h3><i data-lucide="book-open"></i> Matérias Populares</h3>
        <div class="chips">
          <span>Cálculo</span><span>Física</span><span>Algoritmos</span>
          <span>Estatística</span><span>Redes</span><span>IA</span>
        </div>
      </section>
    </aside>
  </main>

  <div id="toast-container"></div>

  <script src="../scripts/brainhub-shared.js"></script>
  <script type="module" src="../scripts/supabaseClient.js"></script>
  <script defer src="../scripts/usuario.js"></script>

</body>
</html>
