<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#7c5cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BrainHUB" />
  <link rel="apple-touch-icon" href="./imagens/favicon.png" />
  <link rel="icon" type="image/png" href="./imagens/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BrainHUB | Notificações</title>
  <link rel="stylesheet" href="./css/home.css?v=2" />
  <link rel="stylesheet" href="./css/notificacoes.css?v=2" />
  <script src="https://unpkg.com/lucide@0.511.0"></script>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="home.html" class="brand">
        <div class="brand-icon">B</div>
        <h1>Brain<span>HUB</span></h1>
      </a>
    </div>
    <nav class="main-nav">
      <a href="home.html"><i data-lucide="house"></i> Feed</a>
      <a href="grupos.html"><i data-lucide="users"></i> Grupos</a>
      <a href="chat.html"><i data-lucide="message-circle"></i> Chat</a>
      <a href="exercicios.html"><i data-lucide="zap"></i> Exercícios</a>
      <a href="perfil.html"><i data-lucide="user"></i> Perfil</a>
    </nav>
    <div class="top-actions">
      <button class="icon-btn notification-btn" onclick="window.location.href='notificacoes.html'">
        <i data-lucide="bell"></i>
        <span class="badge" id="notifBadge" style="display:none">0</span>
      </button>
      <button class="icon-btn"><i data-lucide="search"></i></button>
    </div>
  </header>

  <main class="notif-page">
    <div class="notif-container">

      <div class="notif-header">
        <div>
          <h2>Notificações</h2>
          <p id="notifSubtitle">Carregando...</p>
        </div>
        <div class="notif-header-btns">
          <button class="btn-notif-ghost" id="btnMarcarTodas">Marcar todas como lidas</button>
          <button class="btn-notif-ghost" id="btnLimparLidas">Limpar lidas</button>
        </div>
      </div>

      <div class="notif-summary">
        <div class="notif-summary-box"><div class="sum-icon">👍</div><strong id="sumLikes">—</strong><span>Curtidas</span></div>
        <div class="notif-summary-box"><div class="sum-icon">💬</div><strong id="sumComments">—</strong><span>Comentários</span></div>
        <div class="notif-summary-box"><div class="sum-icon">👥</div><strong id="sumFollowers">—</strong><span>Seguidores</span></div>
      </div>

      <div class="notif-tabs">
        <button class="notif-tab active" data-tab="todas">Todas <span class="notif-tab-count" id="countTodas">0</span></button>
        <button class="notif-tab" data-tab="curtida">Curtidas <span class="notif-tab-count" id="countCurtidas">0</span></button>
        <button class="notif-tab" data-tab="comentario">Comentários <span class="notif-tab-count" id="countComents">0</span></button>
        <button class="notif-tab" data-tab="seguidor">Seguidores <span class="notif-tab-count" id="countSeguidores">0</span></button>
      </div>

      <div id="notifList">
        <p style="text-align:center;padding:32px;color:var(--muted)">Carregando notificações...</p>
      </div>

    </div>
  </main>

  <div id="toast-container"></div>

  <script src="./scripts/brainhub-shared.js"></script>
  <script type="module" src="./scripts/supabaseClient.js"></script>
  <script defer src="./scripts/notificacoes.js"></script>

  <div class="search-overlay hidden" id="searchOverlay">
    <div class="search-modal">
      <div class="search-input-wrap">
        <i data-lucide="search"></i>
        <input type="text" id="searchGlobal" placeholder="Pesquise posts, grupos, usuários..." autofocus />
        <button class="search-close" id="searchClose"><i data-lucide="x"></i></button>
      </div>
      <div id="searchFilters"></div>
      <div class="search-results" id="searchResults">
        <p class="search-hint">Digite algo para pesquisar...</p>
      </div>
    </div>
  </div>
  <script src="./scripts/search.js"></script>

  <nav class="mobile-bottom-nav">
    <a href="home.html" class="mob-nav-item"><i data-lucide="house"></i><span>Feed</span></a>
    <a href="grupos.html" class="mob-nav-item"><i data-lucide="users"></i><span>Grupos</span></a>
    <a href="chat.html" class="mob-nav-item"><i data-lucide="message-circle"></i><span>Chat</span></a>
    <a href="exercicios.html" class="mob-nav-item"><i data-lucide="zap"></i><span>Exercícios</span></a>
    <a href="perfil.html" class="mob-nav-item"><i data-lucide="user"></i><span>Perfil</span></a>
  </nav>
  <script src="./scripts/pwa.js"></script>
</body>
</html>
