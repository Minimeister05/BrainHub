<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#7c5cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BrainHUB" />
  <link rel="apple-touch-icon" href="./imagens/favicon.png" />
  <link rel="icon" type="image/png" href="./imagens/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BrainHUB | Perfil</title>
  <link rel="stylesheet" href="./css/home.css?v=2" />
  <link rel="stylesheet" href="./css/perfil.css?v=2" />
  <link rel="stylesheet" href="./css/usuario.css?v=2" />
  <script src="https://unpkg.com/lucide@0.511.0"></script>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="home.html" class="brand">
        <div class="brand-icon">B</div>
        <h1>Brain<span>HUB</span></h1>
      </a>
    </div>
    <nav class="main-nav">
      <a href="home.html"><i data-lucide="house"></i> Feed</a>
      <a href="grupos.html"><i data-lucide="users"></i> Grupos</a>
      <a href="chat.html"><i data-lucide="message-circle"></i> Chat</a>
      <a href="exercicios.html"><i data-lucide="zap"></i> Exercícios</a>
      <a href="perfil.html"><i data-lucide="user"></i> Perfil</a>
    </nav>
    <div class="top-actions">
      <button class="icon-btn notification-btn" onclick="window.location.href='notificacoes.html'">
        <i data-lucide="bell"></i>
        <span class="badge" style="display:none">0</span>
      </button>
      <button class="icon-btn"><i data-lucide="search"></i></button>
    </div>
  </header>

  <main class="usuario-layout">

    <!-- Coluna esquerda: perfil -->
    <aside class="usuario-sidebar">
      <div class="usuario-profile-card card">
        <div class="profile-banner"></div>
        <div class="perfil-avatar" id="usuarioAvatar">?</div>

        <div class="usuario-profile-info">
          <h2 id="usuarioNome">Carregando...</h2>
          <p id="usuarioCurso" class="usuario-sub"></p>
          <p id="usuarioBio" class="usuario-bio"></p>
        </div>

        <div class="usuario-profile-stats">
          <div><strong id="statPosts">—</strong><span>POSTS</span></div>
          <div><strong id="statSeguidores">—</strong><span>SEGUIDORES</span></div>
          <div><strong id="statSeguindo">—</strong><span>SEGUINDO</span></div>
        </div>

        <div class="usuario-profile-acoes">
          <button class="usuario-follow-btn" id="btnFollow">
            <i data-lucide="user-plus"></i> Seguir
          </button>
          <a class="usuario-msg-btn" id="btnMsg" href="#">
            <i data-lucide="message-circle"></i> Mensagem
          </a>
          <button class="icon-btn small" id="btnReportUser" title="Denunciar usuário" style="color:var(--muted)">
            <i data-lucide="flag"></i>
          </button>
        </div>
      </div>
    </aside>

    <!-- Coluna principal: sobre + posts -->
    <section class="usuario-posts-col">

      <!-- Card Sobre (sempre visível) -->
      <div class="usuario-sobre-card card" id="usuarioSobre" style="display:none">
        <h4 class="usuario-sobre-titulo"><i data-lucide="info"></i> Sobre</h4>
        <div id="usuarioSobreInfo"></div>
        <div class="usuario-sobre-meta" id="usuarioSobreMeta"></div>
      </div>

      <div class="usuario-posts-header">
        <h3><i data-lucide="file-text"></i> Posts</h3>
      </div>
      <div id="usuarioPosts">
        <p style="color:var(--muted);text-align:center;padding:32px">Carregando posts...</p>
      </div>
    </section>

  </main>

  <div id="toast-container"></div>

  <script src="./scripts/brainhub-shared.js?v=3"></script>
  <script type="module" src="./scripts/supabaseClient.js"></script>
  <script defer src="./scripts/usuario.js"></script>

  <nav class="mobile-bottom-nav">
    <a href="home.html" class="mob-nav-item"><i data-lucide="house"></i><span>Feed</span></a>
    <a href="grupos.html" class="mob-nav-item"><i data-lucide="users"></i><span>Grupos</span></a>
    <a href="chat.html" class="mob-nav-item"><i data-lucide="message-circle"></i><span>Chat</span></a>
    <a href="exercicios.html" class="mob-nav-item"><i data-lucide="zap"></i><span>Exercícios</span></a>
    <a href="perfil.html" class="mob-nav-item"><i data-lucide="user"></i><span>Perfil</span></a>
  </nav>
  <script src="./scripts/pwa.js"></script>
</body>
</html>
