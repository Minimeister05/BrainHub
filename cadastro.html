<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#7c5cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BrainHUB" />
  <link rel="apple-touch-icon" href="./imagens/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrainHUB | Cadastro</title>
    <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>
    <div class="background-overlay"></div>
    <header class="topbar">
        <div class="logo-area">
            <div class="logo-circle">B</div>
            <h1>BrainHub</h1>
        </div>
        <nav class="top-nav">
            <a href="sobre.html">Sobre</a><a href="suporte.html">Suporte</a>
        </nav>
    </header>

    <main class="login-page">
        <section class="login-card">
            <div class="login-icon">B</div>
            <h2>Criar Conta</h2>
            <p class="subtitle">Cadastre-se para se conectar com outros universitários</p>

            <form id="registerForm" class="login-form">
                <div class="input-group">
                    <label for="reg-nome">Nome Completo</label>
                    <input type="text" id="reg-nome" placeholder="Seu Nome" required />
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="text" id="reg-email" placeholder="email@pucpr.br" required />
                </div>
                <div class="input-group">
                    <label for="reg-senha">Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-senha" placeholder="Crie uma senha" required />
                        <button type="button" class="toggle-senha" onclick="toggleSenha('reg-senha', this)" aria-label="Mostrar senha">
                            <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-button">Cadastrar</button>
            </form>
            <p class="register-text">Já tem uma conta? <a href="login.html">Fazer login</a></p>
        </section>
    </main>
    <script>
        function toggleSenha(id, btn) {
            const input = document.getElementById(id);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.querySelector('.eye-open').style.display = isPassword ? 'none' : '';
            btn.querySelector('.eye-closed').style.display = isPassword ? '' : 'none';
        }
    </script>
    <script type="module" src="./scripts/auth-supabase.js"></script>
  <script src="./scripts/pwa.js"></script>
</body>

</html>
