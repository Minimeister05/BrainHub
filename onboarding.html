<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#7c5cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BrainHUB" />
  <link rel="apple-touch-icon" href="./imagens/icon-192.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BrainHUB | Bem-vindo!</title>
  <link rel="stylesheet" href="./css/onboarding.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('HBX2IWHj4B4btav_M')</script>
</head>

<body>
  <div class="background-overlay"></div>

  <header class="topbar">
    <div class="logo-area">
      <div class="logo-circle">B</div>
      <h1>BrainHUB</h1>
    </div>
  </header>

  <main class="onboarding-page">
    <div class="steps-indicator">
      <div class="step active" data-step="1"></div>
      <div class="step" data-step="2"></div>
      <div class="step" data-step="3"></div>
    </div>


    <section class="onboarding-card" id="step1">
      <div class="welcome-avatar" id="welcomeAvatar">?</div>
      <h2>Bem-vindo ao BrainHUB! </h2>
      <p class="subtitle">Você está a poucos passos de se conectar com outros universitários. Vamos montar seu perfil?
      </p>
      <button class="btn-next" id="btnStep1">Vamos lá!</button>
    </section>

    <section class="onboarding-card hidden" id="step2">
      <h2>Sobre você</h2>
      <p class="subtitle">Essas informações aparecem no seu perfil público.</p>

      <div class="form-fields">
        <div class="field-group">
          <label for="onbNome">Nome completo</label>
          <input type="text" id="onbNome" placeholder="Como você quer ser chamado?" maxlength="60" />
        </div>

        <div class="field-group">
          <label for="onbCurso">Curso</label>
          <input type="text" id="onbCurso" placeholder="Ex: Ciência da Computação" maxlength="60" />
          <div class="sugestao-check-row">
            <input type="checkbox" id="chkCursoSugestao" />
            <label for="chkCursoSugestao">Não achou o seu curso? Escreva ele aqui que nós iremos colocar.</label>
          </div>
          <input type="text" id="onbCursoSugestao" class="sugestao-input hidden" placeholder="Digite o nome do seu curso..." maxlength="100" />
        </div>

        <div class="field-group">
          <label for="onbFaculdade">Faculdade</label>
          <input type="text" id="onbFaculdade" placeholder="Ex: PUCPR, USP, UFPR..." maxlength="80" />
          <div class="sugestao-check-row">
            <input type="checkbox" id="chkFaculdadeSugestao" />
            <label for="chkFaculdadeSugestao">Não achou a sua faculdade? Escreva ela aqui que nós iremos colocar.</label>
          </div>
          <input type="text" id="onbFaculdadeSugestao" class="sugestao-input hidden" placeholder="Digite o nome da sua faculdade..." maxlength="100" />
        </div>

        <div class="field-group">
          <label for="onbPeriodo">Período</label>
          <select id="onbPeriodo">
            <option value="">Selecione seu período</option>
            <option value="1º período">1º período</option>
            <option value="2º período">2º período</option>
            <option value="3º período">3º período</option>
            <option value="4º período">4º período</option>
            <option value="5º período">5º período</option>
            <option value="6º período">6º período</option>
            <option value="7º período">7º período</option>
            <option value="8º período">8º período</option>
            <option value="9º período">9º período</option>
            <option value="10º período">10º período</option>
          </select>
        </div>

        <div class="field-group">
          <label for="onbBio">Bio <span class="char-count" id="onbBioCount">0/160</span></label>
          <textarea id="onbBio" placeholder="Conte um pouco sobre você..." maxlength="160" rows="3"></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-back" id="btnBack2">Voltar</button>
        <button class="btn-next" id="btnStep2">Continuar</button>
      </div>
    </section>


    <section class="onboarding-card hidden" id="step3">
      <h2>Personalize seu avatar</h2>
      <p class="subtitle">Escolha uma cor para representar você.</p>

      <div class="avatar-preview" id="avatarPreview">?</div>

      <div class="color-picker">
        <button class="color-opt selected" data-cor="" style="background: linear-gradient(135deg,#8f72ff,#4e2edf);"
          title="Roxo"></button>
        <button class="color-opt" data-cor="av-green" style="background: linear-gradient(135deg,#26d0a8,#119f7f);"
          title="Verde"></button>
        <button class="color-opt" data-cor="av-pink" style="background: linear-gradient(135deg,#ff6ec7,#b63cff);"
          title="Rosa"></button>
        <button class="color-opt" data-cor="av-orange" style="background: linear-gradient(135deg,#ffb144,#ff6a33);"
          title="Laranja"></button>
        <button class="color-opt" data-cor="av-blue" style="background: linear-gradient(135deg,#6d8bff,#5367ff);"
          title="Azul"></button>
        <button class="color-opt" data-cor="av-red" style="background: linear-gradient(135deg,#ff4b6e,#c2183a);"
          title="Vermelho"></button>
      </div>

      <div class="btn-row">
        <button class="btn-back" id="btnBack3">Voltar</button>
        <button class="btn-next btn-finish" id="btnFinish">Entrar no BrainHUB</button>
      </div>
    </section>
  </main>

  <!-- ANTES do onboarding.js -->
  <script type="module" src="./scripts/supabaseClient.js"></script>
  <script src="./scripts/br-dados.js"></script>
  <script defer src="./scripts/onboarding.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initAutocomplete('onbCurso', CURSOS_BR)
      initAutocomplete('onbFaculdade', FACULDADES_BR)
    })
  </script>
  <script src="./scripts/pwa.js"></script>
</body>

</html>
